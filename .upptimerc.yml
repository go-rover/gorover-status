owner: go-rover
repo: gorover-status

assignees:
  - kangza

status-website:
  cname: status.gorover.xyz
  name: GoRover Status
  logoUrl: https://gorover.xyz/brand/gorover-logo-neon.png
  favicon: https://gorover.xyz/brand/gorover-logo-neon.png
  introTitle: "GoRover System Status"
  introMessage: "Realtime status untuk Dashboard, Swarm, Radar, dan Managed."
  themeUrl: https://raw.githubusercontent.com/go-rover/gorover-status/main/theme/gorover-status.css
  navbar:
    - title: Status
      href: /
    - title: Main Site
      href: https://gorover.xyz
    - title: Dashboard
      href: https://app.gorover.xyz

sites:
  - name: Dashboard
    url: https://app.gorover.xyz/health
    expectedStatusCodes:
      - 200
  - name: Swarm API
    url: https://swarm.gorover.xyz/health
    expectedStatusCodes:
      - 200
  - name: Radar API
    url: https://app.gorover.xyz/api/health/radar
    expectedStatusCodes:
      - 200
  - name: Managed API
    url: https://app.gorover.xyz/api/health/managed
    expectedStatusCodes:
      - 200

workflowSchedule:
  uptime: "*/5 * * * *"
  responseTime: "0 * * * *"
  summary: "0 * * * *"
  graphs: "0 0 * * *"
  staticSite: "0 * * * *"

i18n:
  footer: "Status GoRover · Powered by Upptime"
